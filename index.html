<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohmyfood</title>
    <meta name="description" content="Ohmyfood, réservez le menu qui vous convient. ">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
        integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <img src="assets/images/logo/ohmyfood.png" alt="Ohmyfood">
    </header>
    <main>
        <section class="hero">
            <p class="hero__location"><i class="fa-solid fa-location-dot hero__icon" aria-hidden="true"></i><span
                    class="sr-only">Localisation :</span>Paris,
                Belleville</p>
            <div class="hero__content">
                <h1 class="hero__title">Réservez le menu qui vous convient</h1>
                <p class="hero__subtitle">Découvrez des restaurants d’exception, sélectionnés par nos soins.
                </p>
                <a class="button hero__button" href="#">Explorer nos restaurants</a>
            </div>
        </section>
        <section class="how-it-works">
            <h2 class="how-it-works__title">Fonctionnement</h2>
            <ol class="how-it-works__list">
                <li class="how-it-works__item">
                    <span class="how-it-works__number" aria-hidden="true">1</span>
                    <i class="fa-solid fa-mobile-screen how-it-works__icon" aria-hidden="true"></i>
                    <span class="how-it-works__text">Choisissez un restaurant</span>
                </li>
                <li class="how-it-works__item">
                    <span class="how-it-works__number" aria-hidden="true">2</span>
                    <i class="fa-solid fa-list-ul how-it-works__icon" aria-hidden="true"></i>
                    <span class="how-it-works__text">Composez votre menu</span>
                </li>
                <li class="how-it-works__item">
                    <span class="how-it-works__number" aria-hidden="true">3</span>
                    <i class="fa-solid fa-store how-it-works__icon" aria-hidden="true"></i>
                    <span class="how-it-works__text">Dégustez au restaurant</span>
                </li>
            </ol>
        </section>
    </main>
    <footer></footer>
</body>

</html>
